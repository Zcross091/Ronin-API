name: Daily Manga Miner
on:
  schedule:
    # Runs at 17:10 UTC (10:40 PM IST) every day
    - cron: '10 17 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  mine-manga:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # You can safely drop the timeout now that we are only doing 100
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # This caches node_modules so boot-up is instant

      - name: Install dependencies
        run: npm ci # Uses clean install from package-lock for faster execution

      - name: Install ts-node globally
        run: npm install -g ts-node typescript

      - name: Run Smart Top 100 Manga Miner
        run: ts-node manga_miner.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
